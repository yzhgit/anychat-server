syntax = "proto3";

package anychat.conversation;

import "google/protobuf/timestamp.proto";
import "common/common.proto";

option go_package = "github.com/anychat/server/api/proto/conversation;conversationpb";

// ConversationService conversation management service
service ConversationService {
  // GetConversations get user conversation list (supports incremental sync)
  rpc GetConversations(GetConversationsRequest) returns (GetConversationsResponse);

  // GetConversation get single conversation details
  rpc GetConversation(GetConversationRequest) returns (Conversation);

  // CreateOrUpdateConversation create or update conversation (called by message service when messages arrive)
  rpc CreateOrUpdateConversation(CreateOrUpdateConversationRequest) returns (Conversation);

  // DeleteConversation delete conversation
  rpc DeleteConversation(DeleteConversationRequest) returns (common.Empty);

  // SetPinned pin/unpin conversation
  rpc SetPinned(SetPinnedRequest) returns (common.Empty);

  // SetMuted enable/disable do-not-disturb for conversation
  rpc SetMuted(SetMutedRequest) returns (common.Empty);

  // ClearUnread clear conversation unread count (mark as read)
  rpc ClearUnread(ClearUnreadRequest) returns (common.Empty);

  // GetTotalUnread get total unread count across all user conversations
  rpc GetTotalUnread(GetTotalUnreadRequest) returns (GetTotalUnreadResponse);

  // IncrUnread increment conversation unread count (called by message service when messages arrive)
  rpc IncrUnread(IncrUnreadRequest) returns (common.Empty);

  // SetBurnAfterReading set burn-after-reading duration (seconds), 0 means disable
  rpc SetBurnAfterReading(SetBurnAfterReadingRequest) returns (common.Empty);

  // SetAutoDelete set auto-delete duration (seconds), 0 means disable
  rpc SetAutoDelete(SetAutoDeleteRequest) returns (common.Empty);
}

enum ConversationType {
  CONVERSATION_TYPE_UNSPECIFIED = 0;
  CONVERSATION_TYPE_SINGLE = 1;
  CONVERSATION_TYPE_GROUP = 2;
  CONVERSATION_TYPE_SYSTEM = 3;
}

// Conversation conversation
message Conversation {
  string conversation_id = 1;
  ConversationType conversation_type = 2;             // 1-single/2-group/3-system
  string user_id = 3;
  string target_id = 4;                          // for single chat: peer user ID; for group chat: group ID
  string last_message_id = 5;
  string last_message_content = 6;
  google.protobuf.Timestamp last_message_time = 7;
  int32 unread_count = 8;
  bool is_pinned = 9;
  bool is_muted = 10;
  google.protobuf.Timestamp pin_time = 11;       // pin timestamp (for sorting)
  int32 burn_after_reading = 14;                 // burn-after-reading duration (seconds), 0 means disabled
  int32 auto_delete_duration = 15;               // auto-delete duration (seconds), 0 means disabled
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

// GetConversationsRequest get conversation list request
message GetConversationsRequest {
  string user_id = 1;
  int32 limit = 2;
  optional int64 updated_before = 3;             // Unix timestamp for incremental sync (returns only conversations updated before this time)
}

// GetConversationsResponse get conversation list response
message GetConversationsResponse {
  repeated Conversation conversations = 1;
  bool has_more = 2;
}

// GetConversationRequest get single conversation request
message GetConversationRequest {
  string user_id = 1;
  string conversation_id = 2;
}

// GetConversationByUserAndTargetRequest get conversation by user ID, conversation type, and target ID request
message GetConversationByUserAndTargetRequest {
  string user_id = 1;
  ConversationType conversation_type = 2;  // 1-single/2-group
  string target_id = 3;
}

// CreateOrUpdateConversationRequest create or update conversation request
message CreateOrUpdateConversationRequest {
  ConversationType conversation_type = 1;             // 1-single/2-group/3-system
  string user_id = 2;
  string target_id = 3;
  string last_message_id = 4;
  string last_message_content = 5;
  int64 last_message_timestamp = 6;              // Unix timestamp (seconds)
}

// DeleteConversationRequest delete conversation request
message DeleteConversationRequest {
  string user_id = 1;
  string conversation_id = 2;
}

// SetPinnedRequest set pin request
message SetPinnedRequest {
  string user_id = 1;
  string conversation_id = 2;
  bool pinned = 3;
}

// SetMutedRequest set do-not-disturb request
message SetMutedRequest {
  string user_id = 1;
  string conversation_id = 2;
  bool muted = 3;
}

// ClearUnreadRequest clear unread count request
message ClearUnreadRequest {
  string user_id = 1;
  string conversation_id = 2;
}

// GetTotalUnreadRequest get total unread count request
message GetTotalUnreadRequest {
  string user_id = 1;
}

// GetTotalUnreadResponse get total unread count response
message GetTotalUnreadResponse {
  int32 total_unread = 1;
}

// IncrUnreadRequest increment unread count request
message IncrUnreadRequest {
  string user_id = 1;
  string conversation_id = 2;
  int32 count = 3;
}

// SetBurnAfterReadingRequest set burn-after-reading request
message SetBurnAfterReadingRequest {
  string user_id = 1;
  string conversation_id = 2;
  int32 duration = 3;  // seconds, 0 means disable
}

// SetAutoDeleteRequest set auto-delete request
message SetAutoDeleteRequest {
  string user_id = 1;
  string conversation_id = 2;
  int32 duration = 3;  // seconds, 0 means disable
}
