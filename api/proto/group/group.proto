syntax = "proto3";

package anychat.group;

import "google/protobuf/timestamp.proto";
import "common/common.proto";

option go_package = "github.com/anychat/server/api/proto/group;grouppb";

// GroupService 群组服务
service GroupService {
  // ========== 内部服务调用接口 ==========

  // GetGroupInfo 获取群信息（供Message Service调用）
  rpc GetGroupInfo(GetGroupInfoRequest) returns (GetGroupInfoResponse);

  // GetGroupMembers 获取群成员列表（供Message Service调用）
  rpc GetGroupMembers(GetGroupMembersRequest) returns (GetGroupMembersResponse);

  // IsMember 检查是否为群成员（供Message Service调用）
  rpc IsMember(IsMemberRequest) returns (IsMemberResponse);

  // GetUserGroups 获取用户加入的群列表（支持增量同步）
  rpc GetUserGroups(GetUserGroupsRequest) returns (GetUserGroupsResponse);

  // ========== Gateway HTTP API调用接口 ==========

  // CreateGroup 创建群组
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);

  // UpdateGroup 更新群信息
  rpc UpdateGroup(UpdateGroupRequest) returns (common.Empty);

  // DissolveGroup 解散群组
  rpc DissolveGroup(DissolveGroupRequest) returns (common.Empty);

  // InviteMembers 邀请成员
  rpc InviteMembers(InviteMembersRequest) returns (common.Empty);

  // RemoveMember 移除成员
  rpc RemoveMember(RemoveMemberRequest) returns (common.Empty);

  // QuitGroup 退出群组
  rpc QuitGroup(QuitGroupRequest) returns (common.Empty);

  // UpdateMemberRole 更新成员角色
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (common.Empty);

  // UpdateMemberNickname 更新群昵称
  rpc UpdateMemberNickname(UpdateMemberNicknameRequest) returns (common.Empty);

  // TransferOwnership 转让群主
  rpc TransferOwnership(TransferOwnershipRequest) returns (common.Empty);

  // JoinGroup 加入群组（申请或直接加入）
  rpc JoinGroup(JoinGroupRequest) returns (JoinGroupResponse);

  // HandleJoinRequest 处理入群申请
  rpc HandleJoinRequest(HandleJoinRequestRequest) returns (common.Empty);

  // GetJoinRequests 获取入群申请列表
  rpc GetJoinRequests(GetJoinRequestsRequest) returns (GetJoinRequestsResponse);

  // PinGroupMessage 置顶群消息
  rpc PinGroupMessage(PinGroupMessageRequest) returns (common.Empty);

  // UnpinGroupMessage 取消置顶群消息
  rpc UnpinGroupMessage(UnpinGroupMessageRequest) returns (common.Empty);

  // GetPinnedMessages 获取群置顶消息列表
  rpc GetPinnedMessages(GetPinnedMessagesRequest) returns (GetPinnedMessagesResponse);

  // SetGroupMute 设置全体禁言
  rpc SetGroupMute(SetGroupMuteRequest) returns (common.Empty);

  // MuteMember 禁言成员
  rpc MuteMember(MuteMemberRequest) returns (common.Empty);

  // UnmuteMember 解除禁言
  rpc UnmuteMember(UnmuteMemberRequest) returns (common.Empty);

  // UpdateGroupSettings 更新群组设置
  rpc UpdateGroupSettings(UpdateGroupSettingsRequest) returns (common.Empty);

  // GetGroupSettings 获取群组设置
  rpc GetGroupSettings(GetGroupSettingsRequest) returns (GetGroupSettingsResponse);

  // UpdateMemberRemark 设置/清空群备注（仅对自己可见）
  rpc UpdateMemberRemark(UpdateMemberRemarkRequest) returns (common.Empty);

  // GetGroupQRCode 获取群二维码（自动续期或创建）
  rpc GetGroupQRCode(GetGroupQRCodeRequest) returns (GetGroupQRCodeResponse);

  // RefreshGroupQRCode 刷新群二维码（使旧码失效）
  rpc RefreshGroupQRCode(RefreshGroupQRCodeRequest) returns (GetGroupQRCodeResponse);

  // JoinGroupByQRCode 扫码加入群组
  rpc JoinGroupByQRCode(JoinGroupByQRCodeRequest) returns (JoinGroupByQRCodeResponse);
}

// ========== 内部调用消息 ==========

message GetGroupInfoRequest {
  string group_id = 1;
  optional string user_id = 2;  // 若传入，则 display_name 会反映该用户设置的群备注
}

message GetGroupInfoResponse {
  string group_id = 1;
  string name = 2;
  string avatar = 3;
  string announcement = 4;
  string description = 13;
  string owner_id = 5;
  int32 member_count = 6;
  int32 max_members = 7;
  bool join_verify = 8;
  bool is_muted = 9;
  int32 status = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  string display_name = 14;  // 展示名：群备注优先，无备注则同 name
}

message GetGroupMembersRequest {
  string group_id = 1;  // Keep original field number!
  optional int32 page = 2;
  optional int32 page_size = 3;
  string user_id = 4;  // Add new field with new number
}

message GetGroupMembersResponse {
  repeated GroupMember members = 1;
  int64 total = 2;
}

message GroupMember {
  string user_id = 1;
  optional string group_nickname = 2;
  string role = 3;  // owner/admin/member
  reserved 4;
  google.protobuf.Timestamp joined_at = 5;
  optional common.UserInfo user_info = 6;
  optional google.protobuf.Timestamp muted_until = 7;
}

message IsMemberRequest {
  string group_id = 1;
  string user_id = 2;
}

message IsMemberResponse {
  bool is_member = 1;
  string role = 2;
}

message GetUserGroupsRequest {
  string user_id = 1;
  optional int64 last_update_time = 2;  // Unix timestamp for incremental sync
}

message GetUserGroupsResponse {
  repeated GroupInfo groups = 1;
  int64 update_time = 2;  // Current server timestamp
  int64 total = 3;  // Total number of groups
}

message GroupInfo {
  string group_id = 1;
  string name = 2;
  string avatar = 3;
  int32 member_count = 4;
  google.protobuf.Timestamp updated_at = 5;
  string display_name = 6;  // 展示名：群备注优先，无备注则同 name
}

// ========== Gateway调用消息 ==========

message CreateGroupRequest {
  string user_id = 1;
  string name = 2;
  optional string avatar = 3;
  repeated string member_ids = 4;
  reserved 5;
}

message CreateGroupResponse {
  string group_id = 1;
  string name = 2;
  optional string avatar = 3;
  string owner_id = 4;
  int32 member_count = 5;
  google.protobuf.Timestamp created_at = 6;
}

message UpdateGroupRequest {
  string user_id = 1;
  string group_id = 2;
  optional string name = 3;
  optional string avatar = 4;
  optional string announcement = 5;
  optional string description = 6;
}

message DissolveGroupRequest {
  string user_id = 1;
  string group_id = 2;
}

message InviteMembersRequest {
  string user_id = 1;
  string group_id = 2;
  repeated string invitee_ids = 3;
}

message RemoveMemberRequest {
  string user_id = 1;
  string group_id = 2;
  string target_user_id = 3;
}

message QuitGroupRequest {
  string user_id = 1;
  string group_id = 2;
}

message UpdateMemberRoleRequest {
  string user_id = 1;
  string group_id = 2;
  string target_user_id = 3;
  string role = 4;  // admin/member
}

message UpdateMemberNicknameRequest {
  string user_id = 1;
  string group_id = 2;
  string nickname = 3;
}

message TransferOwnershipRequest {
  string user_id = 1;
  string group_id = 2;
  string new_owner_id = 3;
}

message JoinGroupRequest {
  string user_id = 1;
  string group_id = 2;
  optional string message = 3;
  optional string inviter_id = 4;
}

message JoinGroupResponse {
  bool need_verify = 1;
  optional int64 request_id = 2;  // If need_verify=true
}

message HandleJoinRequestRequest {
  string user_id = 1;
  int64 request_id = 2;
  bool accept = 3;
}

message GetJoinRequestsRequest {
  string group_id = 1;
  optional string status = 2;  // pending/accepted/rejected
  string user_id = 3;
}

message GetJoinRequestsResponse {
  repeated JoinRequest requests = 1;
  int64 total = 2;
}

message JoinRequest {
  int64 id = 1;
  string group_id = 2;
  string user_id = 3;
  optional string inviter_id = 4;
  optional string message = 5;
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
  optional common.UserInfo user_info = 8;
}

message PinGroupMessageRequest {
  string user_id = 1;
  string group_id = 2;
  string message_id = 3;
}

message UnpinGroupMessageRequest {
  string user_id = 1;
  string group_id = 2;
  string message_id = 3;
}

message GetPinnedMessagesRequest {
  string user_id = 1;
  string group_id = 2;
}

message PinnedMessage {
  string message_id = 1;
  string content = 2;
  string pinned_by = 3;
  int64 pinned_at = 4;
}

message GetPinnedMessagesResponse {
  repeated PinnedMessage messages = 1;
}

message SetGroupMuteRequest {
  string user_id = 1;
  string group_id = 2;
  bool enabled = 3;
}

enum MuteType {
  MUTE_TYPE_PERMANENT = 0;
  MUTE_TYPE_TEMPORARY = 1;
}

message MuteMemberRequest {
  string user_id = 1;
  string group_id = 2;
  string target_user_id = 3;
  MuteType type = 4;
  int32 duration_minutes = 5;
}

message UnmuteMemberRequest {
  string user_id = 1;
  string group_id = 2;
  string target_user_id = 3;
}

message UpdateGroupSettingsRequest {
  string user_id = 1;
  string group_id = 2;
  optional bool join_verify = 3;
  optional bool allow_member_invite = 4;
  optional bool allow_view_history = 5;
  optional bool allow_add_friend = 6;
  optional bool allow_member_modify = 7;
  optional bool show_member_nickname = 8 [deprecated = true];
}

message GetGroupSettingsRequest {
  string group_id = 1;
}

message GetGroupSettingsResponse {
  string group_id = 1;
  bool join_verify = 2;
  bool allow_member_invite = 3;
  bool allow_view_history = 4;
  bool allow_add_friend = 5;
  bool allow_member_modify = 6;
  bool show_member_nickname = 7 [deprecated = true];
}

// ========== 群备注消息 ==========

message UpdateMemberRemarkRequest {
  string user_id = 1;
  string group_id = 2;
  string remark = 3;  // 空字符串表示清空备注
}

// ========== 群二维码消息 ==========

message GetGroupQRCodeRequest {
  string user_id = 1;
  string group_id = 2;
}

message GetGroupQRCodeResponse {
  string token = 1;
  string deep_link = 2;  // 如 anychat://group/join?token=xxx
  int64 expire_at = 3;   // Unix 时间戳（秒）
}

message RefreshGroupQRCodeRequest {
  string user_id = 1;
  string group_id = 2;
}

message JoinGroupByQRCodeRequest {
  string user_id = 1;
  string token = 2;
}

message JoinGroupByQRCodeResponse {
  bool joined = 1;               // true=直接加入，false=已提交申请
  string group_id = 2;
  bool need_verify = 3;
  optional int64 request_id = 4; // need_verify=true 时有效
}
