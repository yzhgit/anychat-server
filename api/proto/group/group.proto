syntax = "proto3";

package anychat.group;

import "google/protobuf/timestamp.proto";
import "common/common.proto";

option go_package = "github.com/anychat/server/api/proto/group;grouppb";

enum GroupRole {
  GROUP_ROLE_UNSPECIFIED = 0;
  GROUP_ROLE_OWNER = 1;
  GROUP_ROLE_ADMIN = 2;
  GROUP_ROLE_MEMBER = 3;
}

enum JoinRequestStatus {
  JOIN_REQUEST_STATUS_UNSPECIFIED = 0;
  JOIN_REQUEST_STATUS_PENDING = 1;
  JOIN_REQUEST_STATUS_ACCEPTED = 2;
  JOIN_REQUEST_STATUS_REJECTED = 3;
}

enum MessageContentType {
  MESSAGE_CONTENT_TYPE_UNSPECIFIED = 0;
  MESSAGE_CONTENT_TYPE_TEXT = 1;
  MESSAGE_CONTENT_TYPE_IMAGE = 2;
  MESSAGE_CONTENT_TYPE_VIDEO = 3;
  MESSAGE_CONTENT_TYPE_AUDIO = 4;
  MESSAGE_CONTENT_TYPE_FILE = 5;
  MESSAGE_CONTENT_TYPE_LOCATION = 6;
  MESSAGE_CONTENT_TYPE_CARD = 7;
}

// GroupService group service
service GroupService {
  // ========== Internal service APIs ==========

  // GetGroupInfo get group info (called by Message Service)
  rpc GetGroupInfo(GetGroupInfoRequest) returns (GetGroupInfoResponse);

  // GetGroupMembers get group member list (called by Message Service)
  rpc GetGroupMembers(GetGroupMembersRequest) returns (GetGroupMembersResponse);

  // IsMember check whether user is a group member (called by Message Service)
  rpc IsMember(IsMemberRequest) returns (IsMemberResponse);

  // GetUserGroups get list of groups joined by user (supports incremental sync)
  rpc GetUserGroups(GetUserGroupsRequest) returns (GetUserGroupsResponse);

  // ========== Gateway HTTP APIs ==========

  // CreateGroup create group
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);

  // UpdateGroup update group info
  rpc UpdateGroup(UpdateGroupRequest) returns (common.Empty);

  // DissolveGroup dissolve group
  rpc DissolveGroup(DissolveGroupRequest) returns (common.Empty);

  // InviteMembers invite members
  rpc InviteMembers(InviteMembersRequest) returns (common.Empty);

  // RemoveMember remove member
  rpc RemoveMember(RemoveMemberRequest) returns (common.Empty);

  // QuitGroup quit group
  rpc QuitGroup(QuitGroupRequest) returns (common.Empty);

  // UpdateMemberRole update member role
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (common.Empty);

  // UpdateMemberNickname update group nickname
  rpc UpdateMemberNickname(UpdateMemberNicknameRequest) returns (common.Empty);

  // TransferOwnership transfer group ownership
  rpc TransferOwnership(TransferOwnershipRequest) returns (common.Empty);

  // JoinGroup join group (by request or direct join)
  rpc JoinGroup(JoinGroupRequest) returns (JoinGroupResponse);

  // HandleJoinRequest handle join group request
  rpc HandleJoinRequest(HandleJoinRequestRequest) returns (common.Empty);

  // GetJoinRequests get join group request list
  rpc GetJoinRequests(GetJoinRequestsRequest) returns (GetJoinRequestsResponse);

  // PinGroupMessage pin group message
  rpc PinGroupMessage(PinGroupMessageRequest) returns (common.Empty);

  // UnpinGroupMessage unpin group message
  rpc UnpinGroupMessage(UnpinGroupMessageRequest) returns (common.Empty);

  // GetPinnedMessages get pinned group message list
  rpc GetPinnedMessages(GetPinnedMessagesRequest) returns (GetPinnedMessagesResponse);

  // SetGroupMute set global group mute
  rpc SetGroupMute(SetGroupMuteRequest) returns (common.Empty);

  // MuteMember mute member
  rpc MuteMember(MuteMemberRequest) returns (common.Empty);

  // UnmuteMember unmute member
  rpc UnmuteMember(UnmuteMemberRequest) returns (common.Empty);

  // UpdateGroupSettings update group settings
  rpc UpdateGroupSettings(UpdateGroupSettingsRequest) returns (common.Empty);

  // GetGroupSettings get group settings
  rpc GetGroupSettings(GetGroupSettingsRequest) returns (GetGroupSettingsResponse);

  // UpdateMemberRemark set/clear group remark (visible only to self)
  rpc UpdateMemberRemark(UpdateMemberRemarkRequest) returns (common.Empty);

  // GetGroupQRCode get group QR code (auto-renew or create)
  rpc GetGroupQRCode(GetGroupQRCodeRequest) returns (GetGroupQRCodeResponse);

  // RefreshGroupQRCode refresh group QR code (invalidate old code)
  rpc RefreshGroupQRCode(RefreshGroupQRCodeRequest) returns (GetGroupQRCodeResponse);

  // GetGroupPreviewByQRCode get group preview by QR code
  rpc GetGroupPreviewByQRCode(GetGroupPreviewByQRCodeRequest) returns (GetGroupPreviewByQRCodeResponse);

  // JoinGroupByQRCode join group by scanning QR code
  rpc JoinGroupByQRCode(JoinGroupByQRCodeRequest) returns (JoinGroupByQRCodeResponse);
}

// ========== Internal call messages ==========

message GetGroupInfoRequest {
  string group_id = 1;
  optional string user_id = 2;  // if provided, display_name reflects this user's group remark
}

message GetGroupInfoResponse {
  string group_id = 1;
  string name = 2;
  string avatar = 3;
  string announcement = 4;
  string description = 13;
  string owner_id = 5;
  int32 member_count = 6;
  int32 max_members = 7;
  bool join_verify = 8;
  bool is_muted = 9;
  int32 status = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  string display_name = 14;  // display name: group remark first, or name if no remark
}

message GetGroupMembersRequest {
  string group_id = 1;  // Keep original field number!
  optional int32 page = 2;
  optional int32 page_size = 3;
  string user_id = 4;  // Add new field with new number
}

message GetGroupMembersResponse {
  repeated GroupMember members = 1;
  int64 total = 2;
}

message GroupMember {
  string user_id = 1;
  optional string group_nickname = 2;
  GroupRole role = 3;  // 1=owner,2=admin,3=member
  reserved 4;
  google.protobuf.Timestamp joined_at = 5;
  optional common.UserInfo user_info = 6;
  optional google.protobuf.Timestamp muted_until = 7;
}

message IsMemberRequest {
  string group_id = 1;
  string user_id = 2;
}

message IsMemberResponse {
  bool is_member = 1;
  GroupRole role = 2;
}

message GetUserGroupsRequest {
  string user_id = 1;
  optional int64 last_update_time = 2;  // Unix timestamp for incremental sync
}

message GetUserGroupsResponse {
  repeated GroupInfo groups = 1;
  int64 update_time = 2;  // Current server timestamp
  int64 total = 3;  // Total number of groups
}

message GroupInfo {
  string group_id = 1;
  string name = 2;
  string avatar = 3;
  int32 member_count = 4;
  google.protobuf.Timestamp updated_at = 5;
  string display_name = 6;  // display name: group remark first, or name if no remark
}

// ========== Gateway call messages ==========

message CreateGroupRequest {
  string user_id = 1;
  string name = 2;
  optional string avatar = 3;
  repeated string member_ids = 4;
  reserved 5;
}

message CreateGroupResponse {
  string group_id = 1;
  string name = 2;
  optional string avatar = 3;
  string owner_id = 4;
  int32 member_count = 5;
  google.protobuf.Timestamp created_at = 6;
}

message UpdateGroupRequest {
  string user_id = 1;
  string group_id = 2;
  optional string name = 3;
  optional string avatar = 4;
  optional string announcement = 5;
  optional string description = 6;
}

message DissolveGroupRequest {
  string user_id = 1;
  string group_id = 2;
}

message InviteMembersRequest {
  string user_id = 1;
  string group_id = 2;
  repeated string invitee_ids = 3;
}

message RemoveMemberRequest {
  string user_id = 1;
  string group_id = 2;
  string target_user_id = 3;
}

message QuitGroupRequest {
  string user_id = 1;
  string group_id = 2;
}

message UpdateMemberRoleRequest {
  string user_id = 1;
  string group_id = 2;
  string target_user_id = 3;
  GroupRole role = 4;  // 2=admin,3=member
}

message UpdateMemberNicknameRequest {
  string user_id = 1;
  string group_id = 2;
  string nickname = 3;
}

message TransferOwnershipRequest {
  string user_id = 1;
  string group_id = 2;
  string new_owner_id = 3;
}

message JoinGroupRequest {
  string user_id = 1;
  string group_id = 2;
  optional string message = 3;
  optional string inviter_id = 4;
}

message JoinGroupResponse {
  bool need_verify = 1;
  optional int64 request_id = 2;  // If need_verify=true
}

message HandleJoinRequestRequest {
  string user_id = 1;
  int64 request_id = 2;
  bool accept = 3;
}

message GetJoinRequestsRequest {
  string group_id = 1;
  optional JoinRequestStatus status = 2;  // 1=pending,2=accepted,3=rejected
  string user_id = 3;
}

message GetJoinRequestsResponse {
  repeated JoinRequest requests = 1;
  int64 total = 2;
}

message JoinRequest {
  int64 id = 1;
  string group_id = 2;
  string user_id = 3;
  optional string inviter_id = 4;
  optional string message = 5;
  JoinRequestStatus status = 6;
  google.protobuf.Timestamp created_at = 7;
  optional common.UserInfo user_info = 8;
}

message PinGroupMessageRequest {
  string user_id = 1;
  string group_id = 2;
  string message_id = 3;
}

message UnpinGroupMessageRequest {
  string user_id = 1;
  string group_id = 2;
  string message_id = 3;
}

message GetPinnedMessagesRequest {
  string user_id = 1;
  string group_id = 2;
}

message PinnedMessage {
  string message_id = 1;
  string content = 2;
  string pinned_by = 3;
  int64 pinned_at = 4;
  optional MessageContentType content_type = 5;
  optional int64 message_seq = 6;
}

message GetPinnedMessagesResponse {
  repeated PinnedMessage messages = 1;
  int32 total = 2;
  optional PinnedMessage top_message = 3;
  int64 version = 4;
}

message SetGroupMuteRequest {
  string user_id = 1;
  string group_id = 2;
  bool enabled = 3;
}

enum MuteType {
  MUTE_TYPE_UNSPECIFIED = 0;
  MUTE_TYPE_PERMANENT = 1;
  MUTE_TYPE_TEMPORARY = 2;
}

message MuteMemberRequest {
  string user_id = 1;
  string group_id = 2;
  string target_user_id = 3;
  MuteType type = 4;
  int32 duration_minutes = 5;
}

message UnmuteMemberRequest {
  string user_id = 1;
  string group_id = 2;
  string target_user_id = 3;
}

message UpdateGroupSettingsRequest {
  string user_id = 1;
  string group_id = 2;
  optional bool join_verify = 3;
  optional bool allow_member_invite = 4;
  optional bool allow_view_history = 5;
  optional bool allow_add_friend = 6;
  optional bool allow_member_modify = 7;
  optional bool show_member_nickname = 8 [deprecated = true];
}

message GetGroupSettingsRequest {
  string group_id = 1;
}

message GetGroupSettingsResponse {
  string group_id = 1;
  bool join_verify = 2;
  bool allow_member_invite = 3;
  bool allow_view_history = 4;
  bool allow_add_friend = 5;
  bool allow_member_modify = 6;
  bool show_member_nickname = 7 [deprecated = true];
}

// ========== Group remark messages ==========

message UpdateMemberRemarkRequest {
  string user_id = 1;
  string group_id = 2;
  string remark = 3;  // empty string means clear remark
}

// ========== Group QR code messages ==========

message GetGroupQRCodeRequest {
  string user_id = 1;
  string group_id = 2;
}

message GetGroupQRCodeResponse {
  string token = 1;
  string deep_link = 2;  // e.g. anychat://group/join?token=xxx
  int64 expire_at = 3;   // Unix timestamp (seconds)
}

message RefreshGroupQRCodeRequest {
  string user_id = 1;
  string group_id = 2;
}

message GetGroupPreviewByQRCodeRequest {
  string token = 1;
}

message GetGroupPreviewByQRCodeResponse {
  string group_id = 1;
  string name = 2;
  string avatar = 3;
  int32 member_count = 4;
  bool need_verify = 5;
}

message JoinGroupByQRCodeRequest {
  string user_id = 1;
  string token = 2;
}

message JoinGroupByQRCodeResponse {
  bool joined = 1;               // true=joined directly, false=request submitted
  string group_id = 2;
  bool need_verify = 3;
  optional int64 request_id = 4; // valid when need_verify=true
}
