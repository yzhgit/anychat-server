syntax = "proto3";

package anychat.user;

import "common/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/anychat/server/api/proto/user;userpb";

enum PushPlatform {
  PUSH_PLATFORM_UNSPECIFIED = 0;
  PUSH_PLATFORM_IOS = 1;
  PUSH_PLATFORM_ANDROID = 2;
}

// UserService user service
service UserService {
  // GetProfile get profile
  rpc GetProfile(GetProfileRequest) returns (UserProfileResponse);

  // UpdateProfile update profile
  rpc UpdateProfile(UpdateProfileRequest) returns (UserProfileResponse);

  // GetUserInfo get user info (query other users)
  rpc GetUserInfo(GetUserInfoRequest) returns (UserInfoResponse);

  // SearchUsers search users
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);

  // GetSettings get user settings
  rpc GetSettings(GetSettingsRequest) returns (UserSettingsResponse);

  // UpdateSettings update user settings
  rpc UpdateSettings(UpdateSettingsRequest) returns (UserSettingsResponse);

  // RefreshQRCode refresh QR code
  rpc RefreshQRCode(RefreshQRCodeRequest) returns (QRCodeResponse);

  // GetUserByQRCode get user by QR code
  rpc GetUserByQRCode(GetUserByQRCodeRequest) returns (UserInfoResponse);

  // UpdatePushToken update push token
  rpc UpdatePushToken(UpdatePushTokenRequest) returns (common.Empty);

  // BindPhone bind phone number
  rpc BindPhone(BindPhoneRequest) returns (BindPhoneResponse);

  // ChangePhone change phone number
  rpc ChangePhone(ChangePhoneRequest) returns (ChangePhoneResponse);

  // BindEmail bind email
  rpc BindEmail(BindEmailRequest) returns (BindEmailResponse);

  // ChangeEmail change email
  rpc ChangeEmail(ChangeEmailRequest) returns (ChangeEmailResponse);

  // InitUserData initialize user data (called by auth-service)
  rpc InitUserData(InitUserDataRequest) returns (common.Empty);
}

// GetProfileRequest get profile request
message GetProfileRequest {
  string user_id = 1;
}

// UpdateProfileRequest update profile request
message UpdateProfileRequest {
  string user_id = 1;
  optional string nickname = 2;
  optional string avatar = 3;
  optional string signature = 4;
  optional int32 gender = 5;  // 0:unknown 1:male 2:female
  optional google.protobuf.Timestamp birthday = 6;
  optional string region = 7;
}

// UserProfileResponse user profile response
message UserProfileResponse {
  string user_id = 1;
  string nickname = 2;
  string avatar = 3;
  string signature = 4;
  int32 gender = 5;
  google.protobuf.Timestamp birthday = 6;
  string region = 7;
  optional string phone = 8;
  optional string email = 9;
  string qrcode_url = 10;
  google.protobuf.Timestamp created_at = 11;
}

// GetUserInfoRequest get user info request
message GetUserInfoRequest {
  string user_id = 1;        // requester ID
  string target_user_id = 2; // target user ID
}

// UserInfoResponse user info response
message UserInfoResponse {
  string user_id = 1;
  string nickname = 2;
  string avatar = 3;
  string signature = 4;
  int32 gender = 5;
  string region = 6;
  bool is_friend = 7;
  bool is_blocked = 8;
}

// SearchUsersRequest search users request
message SearchUsersRequest {
  string keyword = 1;
  int32 page = 2;
  int32 page_size = 3;
}

// SearchUsersResponse search users response
message SearchUsersResponse {
  int64 total = 1;
  repeated UserBriefInfo users = 2;
}

// UserBriefInfo brief user info
message UserBriefInfo {
  string user_id = 1;
  string nickname = 2;
  string avatar = 3;
  string signature = 4;
}

// GetSettingsRequest get user settings request
message GetSettingsRequest {
  string user_id = 1;
}

// UpdateSettingsRequest update user settings request
message UpdateSettingsRequest {
  string user_id = 1;
  optional bool notification_enabled = 2;
  optional bool sound_enabled = 3;
  optional bool vibration_enabled = 4;
  optional bool message_preview_enabled = 5;
  optional bool friend_verify_required = 6;
  optional bool search_by_phone = 7;
  optional bool search_by_id = 8;
  optional string language = 9;
}

// UserSettingsResponse user settings response
message UserSettingsResponse {
  string user_id = 1;
  bool notification_enabled = 2;
  bool sound_enabled = 3;
  bool vibration_enabled = 4;
  bool message_preview_enabled = 5;
  bool friend_verify_required = 6;
  bool search_by_phone = 7;
  bool search_by_id = 8;
  string language = 9;
}

// RefreshQRCodeRequest refresh QR code request
message RefreshQRCodeRequest {
  string user_id = 1;
}

// QRCodeResponse QR code response
message QRCodeResponse {
  string qrcode_url = 1;
  google.protobuf.Timestamp expires_at = 2;
}

// GetUserByQRCodeRequest get user by QR code request
message GetUserByQRCodeRequest {
  string qrcode = 1;
}

// UpdatePushTokenRequest update push token request
message UpdatePushTokenRequest {
  string user_id = 1;
  string device_id = 2;
  string push_token = 3;
  PushPlatform platform = 4;  // 1-iOS/2-Android
}

message BindPhoneRequest {
  string user_id = 1;
  string phone_number = 2;
  string verify_code = 3;
}

message BindPhoneResponse {
  string phone_number = 1;
  bool is_primary = 2;
}

message ChangePhoneRequest {
  string user_id = 1;
  string old_phone_number = 2;
  string new_phone_number = 3;
  string new_verify_code = 4;
  optional string old_verify_code = 5;
  string device_id = 6;
}

message ChangePhoneResponse {
  string old_phone_number = 1;
  string new_phone_number = 2;
}

message BindEmailRequest {
  string user_id = 1;
  string email = 2;
  string verify_code = 3;
}

message BindEmailResponse {
  string email = 1;
  bool is_primary = 2;
}

message ChangeEmailRequest {
  string user_id = 1;
  string old_email = 2;
  string new_email = 3;
  string new_verify_code = 4;
  optional string old_verify_code = 5;
  string device_id = 6;
}

message ChangeEmailResponse {
  string old_email = 1;
  string new_email = 2;
}

// InitUserDataRequest initialize user data request
message InitUserDataRequest {
  string user_id = 1;
  string nickname = 2;
}
