syntax = "proto3";

package anychat.version;

import "common/common.proto";

option go_package = "github.com/anychat/server/api/proto/version;versionpb";

enum Platform {
  PLATFORM_UNSPECIFIED = 0;
  PLATFORM_IOS = 1;
  PLATFORM_ANDROID = 2;
  PLATFORM_PC = 3;
  PLATFORM_WEB = 4;
  PLATFORM_H5 = 5;
}

enum ReleaseType {
  RELEASE_TYPE_UNSPECIFIED = 0;
  RELEASE_TYPE_STABLE = 1;
  RELEASE_TYPE_BETA = 2;
  RELEASE_TYPE_ALPHA = 3;
}

enum VersionStatus {
  VERSION_STATUS_UNSPECIFIED = 0;
  VERSION_STATUS_DRAFT = 1;
  VERSION_STATUS_PUBLISHED = 2;
  VERSION_STATUS_ARCHIVED = 3;
}

// VersionService version service
service VersionService {
  // CheckVersion check for version updates
  rpc CheckVersion(CheckVersionRequest) returns (CheckVersionResponse);
  
  // GetLatestVersion get latest version
  rpc GetLatestVersion(GetLatestVersionRequest) returns (GetLatestVersionResponse);
  
  // ListVersions get version list
  rpc ListVersions(ListVersionsRequest) returns (ListVersionsResponse);
  
  // CreateVersion create version (admin backend)
  rpc CreateVersion(CreateVersionRequest) returns (CreateVersionResponse);
  
  // GetVersion get version details
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);
  
  // DeleteVersion delete version
  rpc DeleteVersion(DeleteVersionRequest) returns (common.Empty);
  
  // ReportVersion report version (when client starts)
  rpc ReportVersion(ReportVersionRequest) returns (common.Empty);
}

// CheckVersionRequest version check request
message CheckVersionRequest {
  Platform platform = 1;   // platform
  string version = 2;    // current version, e.g. 1.0.0
  int32 build_number = 3; // build number (iOS/Android)
}

// CheckVersionResponse version check response
message CheckVersionResponse {
  bool has_update = 1;
  string latest_version = 2;
  int32 latest_build_number = 3;
  bool force_update = 4;
  string min_version = 5;
  int32 min_build_number = 6;
  UpdateInfo update_info = 7;
}

// UpdateInfo update info
message UpdateInfo {
  string title = 1;
  string content = 2;
  string download_url = 3;
  int64 file_size = 4;
  string file_hash = 5;
}

// GetLatestVersionRequest get latest version request
message GetLatestVersionRequest {
  Platform platform = 1;
  ReleaseType release_type = 2;
}

// GetLatestVersionResponse get latest version response
message GetLatestVersionResponse {
  VersionInfo version = 1;
}

// VersionInfo version info
message VersionInfo {
  int64 id = 1;
  Platform platform = 2;
  string version = 3;
  int32 build_number = 4;
  int32 version_code = 5;
  string min_version = 6;
  int32 min_build_number = 7;
  bool force_update = 8;
  ReleaseType release_type = 9;
  VersionStatus status = 16;
  string title = 10;
  string content = 11;
  string download_url = 12;
  int64 file_size = 13;
  string file_hash = 14;
  string published_at = 15;
}

// ListVersionsRequest get version list request
message ListVersionsRequest {
  Platform platform = 1;
  ReleaseType release_type = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// ListVersionsResponse get version list response
message ListVersionsResponse {
  int32 total = 1;
  repeated VersionInfo versions = 2;
}

// CreateVersionRequest create version request
message CreateVersionRequest {
  Platform platform = 1;
  string version = 2;
  int32 build_number = 3;
  int32 version_code = 4;
  string min_version = 5;
  int32 min_build_number = 6;
  bool force_update = 7;
  ReleaseType release_type = 8;
  string title = 9;
  string content = 10;
  string download_url = 11;
  int64 file_size = 12;
  string file_hash = 13;
}

// CreateVersionResponse create version response
message CreateVersionResponse {
  int64 id = 1;
  Platform platform = 2;
  string version = 3;
}

// GetVersionRequest get version details request
message GetVersionRequest {
  int64 id = 1;
}

// GetVersionResponse get version details response
message GetVersionResponse {
  VersionInfo version = 1;
}

// DeleteVersionRequest delete version request
message DeleteVersionRequest {
  int64 id = 1;
}

// ReportVersionRequest report version request
message ReportVersionRequest {
  Platform platform = 1;
  string version = 2;
  int32 build_number = 3;
  string device_id = 4;
  string os_version = 5;
  string sdk_version = 6;
}
