syntax = "proto3";

package anychat.sync;

import "friend/friend.proto";
import "group/group.proto";
import "conversation/conversation.proto";
import "message/message.proto";

option go_package = "github.com/anychat/server/api/proto/sync;syncpb";

// SyncService data synchronization service
// Handles multi-device incremental sync and aggregates data from friend/group/conversation/message services
service SyncService {
  // Sync full/incremental synchronization
  // Called when the client logs in or resumes from background, returning all changes after last_sync_time
  rpc Sync(SyncRequest) returns (SyncResponse);

  // SyncMessages message backfill
  // Pull offline messages by sequence number for each conversation
  rpc SyncMessages(SyncMessagesRequest) returns (SyncMessagesResponse);
}

// ConversationSeq latest known sequence number of a conversation
message ConversationSeq {
  string conversation_id = 1;
  anychat.message.ConversationType conversation_type = 2;  // 1-single/2-group
  int64 last_seq = 3;
}

// SyncRequest synchronization request
message SyncRequest {
  string user_id = 1;
  // last sync time (Unix seconds), 0 means full sync
  int64 last_sync_time = 2;
  // list of conversations that need message backfill (only conversations with new messages)
  repeated ConversationSeq conversation_seqs = 3;
}

// SyncFriendData incremental friend data
message SyncFriendData {
  repeated anychat.friend.Friend friends = 1;
  int64 total = 2;
}

// SyncGroupData incremental group data
message SyncGroupData {
  repeated anychat.group.GroupInfo groups = 1;
  int64 total = 2;
}

// SyncConversationData incremental conversation data
message SyncConversationData {
  repeated anychat.conversation.Conversation conversations = 1;
  bool has_more = 2;
}

// ConversationMessages new messages for a single conversation
message ConversationMessages {
  string conversation_id = 1;
  anychat.message.ConversationType conversation_type = 2;
  repeated anychat.message.Message messages = 3;
  bool has_more = 4;
}

// SyncResponse synchronization response
message SyncResponse {
  SyncFriendData friends = 1;
  SyncGroupData groups = 2;
  SyncConversationData conversation_data = 3;
  repeated ConversationMessages conversations = 4;
  // server timestamp for this sync, stored by client as next last_sync_time
  int64 sync_time = 5;
}

// SyncMessagesRequest message backfill request
message SyncMessagesRequest {
  string user_id = 1;
  repeated ConversationSeq conversation_seqs = 2;
  // maximum number of messages returned per conversation, default 50
  int32 limit_per_conversation = 3;
}

// SyncMessagesResponse message backfill response
message SyncMessagesResponse {
  repeated ConversationMessages conversations = 1;
}
