syntax = "proto3";

package anychat.calling;

import "common/common.proto";

option go_package = "github.com/anychat/server/api/proto/calling;callingpb";

// CallingService audio/video service interface (implementation-agnostic, currently provided by LiveKit)
service CallingService {
  // ── 1:1 calls ──────────────────────────────────────────
  // InitiateCall initiate a call (returns Calling token for caller to join room)
  rpc InitiateCall(InitiateCallRequest) returns (InitiateCallResponse);
  // JoinCall answer a call (returns Calling token for callee to join room)
  rpc JoinCall(JoinCallRequest) returns (JoinCallResponse);
  // RejectCall reject a call
  rpc RejectCall(RejectCallRequest) returns (common.Empty);
  // EndCall end a call
  rpc EndCall(EndCallRequest) returns (common.Empty);
  // GetCallSession get call session details
  rpc GetCallSession(GetCallSessionRequest) returns (CallSession);
  // ListCallLogs get call logs
  rpc ListCallLogs(ListCallLogsRequest) returns (ListCallLogsResponse);

  // ── meeting rooms ────────────────────────────────────────────
  // CreateMeeting create meeting room
  rpc CreateMeeting(CreateMeetingRequest) returns (CreateMeetingResponse);
  // JoinMeeting join meeting room (returns Calling token)
  rpc JoinMeeting(JoinMeetingRequest) returns (JoinMeetingResponse);
  // EndMeeting end meeting room
  rpc EndMeeting(EndMeetingRequest) returns (common.Empty);
  // GetMeeting get meeting room info
  rpc GetMeeting(GetMeetingRequest) returns (MeetingRoom);
  // ListMeetings list active meeting rooms
  rpc ListMeetings(ListMeetingsRequest) returns (ListMeetingsResponse);
}

// ── call-related messages ─────────────────────────────────────────

// CallType call type
enum CallType {
  CALL_TYPE_AUDIO = 0; // audio call
  CALL_TYPE_VIDEO = 1; // video call
}

// CallStatus call status
enum CallStatus {
  CALL_STATUS_RINGING   = 0; // ringing
  CALL_STATUS_CONNECTED = 1; // connected
  CALL_STATUS_ENDED     = 2; // ended
  CALL_STATUS_REJECTED  = 3; // rejected
  CALL_STATUS_MISSED    = 4; // missed
  CALL_STATUS_CANCELLED = 5; // cancelled
}

// CallSession call session
message CallSession {
  string call_id      = 1;
  string caller_id    = 2;
  string callee_id    = 3;
  CallType call_type  = 4;
  CallStatus status   = 5;
  string room_name    = 6;
  int64 started_at    = 7; // Unix seconds
  int64 connected_at  = 8;
  int64 ended_at      = 9;
  int32 duration      = 10; // call duration (seconds)
  int64 created_at    = 11;
}

message InitiateCallRequest {
  string caller_id = 1;
  string callee_id = 2;
  CallType call_type = 3;
}

message InitiateCallResponse {
  string call_id   = 1;
  string room_name = 2;
  string token     = 3; // Calling JWT, used by caller
}

message JoinCallRequest {
  string call_id = 1;
  string user_id = 2; // callee ID
}

message JoinCallResponse {
  string room_name = 1;
  string token     = 2; // Calling JWT, used by callee
}

message RejectCallRequest {
  string call_id = 1;
  string user_id = 2;
}

message EndCallRequest {
  string call_id = 1;
  string user_id = 2;
}

message GetCallSessionRequest {
  string call_id = 1;
  string user_id = 2; // used for authorization (must be a participant)
}

message ListCallLogsRequest {
  string user_id  = 1;
  int32  page     = 2;
  int32  page_size = 3;
}

message ListCallLogsResponse {
  repeated CallSession sessions = 1;
  int64 total = 2;
}

// ── meeting room-related messages ───────────────────────────────────────

// MeetingStatus meeting status
enum MeetingStatus {
  MEETING_STATUS_ACTIVE = 0;
  MEETING_STATUS_ENDED  = 1;
}

// MeetingRoom meeting room
message MeetingRoom {
  string room_id          = 1;
  string creator_id       = 2;
  string title            = 3;
  string room_name        = 4; // Calling room name
  bool   has_password     = 5;
  int32  max_participants = 6;
  MeetingStatus status    = 7;
  int64 started_at        = 8;
  int64 ended_at          = 9;
  int64 created_at        = 10;
}

message CreateMeetingRequest {
  string creator_id       = 1;
  string title            = 2;
  string password         = 3; // optional, public if not set
  int32  max_participants = 4; // 0 = unlimited
}

message CreateMeetingResponse {
  MeetingRoom meeting = 1;
  string token        = 2; // creator's Calling JWT
}

message JoinMeetingRequest {
  string user_id  = 1;
  string room_id  = 2;
  string password = 3; // required if meeting has a password
}

message JoinMeetingResponse {
  MeetingRoom meeting = 1;
  string token        = 2; // Calling JWT
}

message EndMeetingRequest {
  string room_id    = 1;
  string creator_id = 2; // only creator can end
}

message GetMeetingRequest {
  string room_id = 1;
}

message ListMeetingsRequest {
  int32 page      = 1;
  int32 page_size = 2;
}

message ListMeetingsResponse {
  repeated MeetingRoom meetings = 1;
  int64 total = 2;
}
