syntax = "proto3";

package anychat.message;

import "google/protobuf/timestamp.proto";
import "common/common.proto";

option go_package = "github.com/anychat/server/api/proto/message;messagepb";

// MessageService 消息服务
service MessageService {
  // SendMessage 发送消息（单聊/群聊）
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);

  // GetMessages 获取消息列表（历史消息）
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);

  // GetMessagesBefore 获取锚点消息前的历史消息
  rpc GetMessagesBefore(GetMessagesBeforeRequest) returns (GetMessagesBeforeResponse);

  // GetMessagesAfter 获取锚点消息后的消息
  rpc GetMessagesAfter(GetMessagesAfterRequest) returns (GetMessagesAfterResponse);

  // GetMessagesAroundAnchor 获取锚点消息前后窗口
  rpc GetMessagesAroundAnchor(GetMessagesAroundAnchorRequest) returns (GetMessagesAroundAnchorResponse);

  // GetFirstUnreadAnchor 获取第一条未读消息锚点
  rpc GetFirstUnreadAnchor(GetFirstUnreadAnchorRequest) returns (GetFirstUnreadAnchorResponse);

  // GetMessageById 根据ID获取消息
  rpc GetMessageById(GetMessageByIdRequest) returns (Message);

  // RecallMessage 撤回消息
  rpc RecallMessage(RecallMessageRequest) returns (common.Empty);

  // DeleteMessage 删除消息
  rpc DeleteMessage(DeleteMessageRequest) returns (common.Empty);

  // MarkAsRead 标记消息已读
  rpc MarkAsRead(MarkAsReadRequest) returns (common.Empty);

  // MarkMessagesRead 按消息ID批量标记已读
  rpc MarkMessagesRead(MarkMessagesReadRequest) returns (MarkMessagesReadResponse);

  // AckReadTriggers 阅后即焚阅读触发回执
  rpc AckReadTriggers(AckReadTriggersRequest) returns (AckReadTriggersResponse);

  // GetUnreadCount 获取未读消息数
  rpc GetUnreadCount(GetUnreadCountRequest) returns (GetUnreadCountResponse);

  // GetReadReceipts 获取已读回执信息
  rpc GetReadReceipts(GetReadReceiptsRequest) returns (GetReadReceiptsResponse);

  // GetConversationSequence 获取会话当前序列号
  rpc GetConversationSequence(GetConversationSequenceRequest) returns (GetConversationSequenceResponse);

  // SearchMessages 搜索消息
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);

  // SendTyping 发送正在输入状态（单聊）
  rpc SendTyping(SendTypingRequest) returns (common.Empty);
}

// Message 消息
message Message {
  string message_id = 1;
  string conversation_id = 2;
  string conversation_type = 3;  // single/group
  string sender_id = 4;
  string content_type = 5;  // text/image/video/audio/file/location/card
  string content = 6;  // JSON string
  int64 sequence = 7;
  optional string reply_to = 8;
  repeated string at_users = 9;
  int32 status = 10;  // 0-正常 1-撤回 2-删除
  google.protobuf.Timestamp expire_time = 13;  // 消息过期时间,为空表示永不过期
  optional string target_id = 14;  // single为对方用户ID，group为群ID
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;

  // 扩展字段（用于客户端显示）
  optional common.UserInfo sender_info = 20;
  optional Message reply_to_message = 21;
}

// SendMessageRequest 发送消息请求
message SendMessageRequest {
  string sender_id = 1;
  string conversation_id = 2;
  string content_type = 3;
  string content = 4;  // JSON string
  optional string reply_to = 5;
  repeated string at_users = 6;
  string local_id = 7;  // 客户端本地ID（用于发送幂等）
}

// SendMessageResponse 发送消息响应
message SendMessageResponse {
  string message_id = 1;
  int64 sequence = 2;
  google.protobuf.Timestamp timestamp = 3;
}

// GetMessagesRequest 获取消息列表请求
message GetMessagesRequest {
  string conversation_id = 1;
  optional int64 start_seq = 2;  // 起始序列号
  optional int64 end_seq = 3;  // 结束序列号
  int32 limit = 4;  // 数量限制
  bool reverse = 5;  // 是否倒序（从新到旧）
}

// GetMessagesResponse 获取消息列表响应
message GetMessagesResponse {
  repeated Message messages = 1;
  int64 total = 2;
  bool has_more = 3;
}

// GetMessagesBeforeRequest 获取锚点前消息请求
message GetMessagesBeforeRequest {
  string conversation_id = 1;
  string anchor_message_id = 2;
  int32 limit = 3;
}

// GetMessagesBeforeResponse 获取锚点前消息响应
message GetMessagesBeforeResponse {
  Message anchor_message = 1;
  repeated Message messages = 2;
  bool has_more = 3;
}

// GetMessagesAfterRequest 获取锚点后消息请求
message GetMessagesAfterRequest {
  string conversation_id = 1;
  string anchor_message_id = 2;
  int32 limit = 3;
}

// GetMessagesAfterResponse 获取锚点后消息响应
message GetMessagesAfterResponse {
  Message anchor_message = 1;
  repeated Message messages = 2;
  bool has_more = 3;
}

// GetMessagesAroundAnchorRequest 获取锚点前后消息窗口请求
message GetMessagesAroundAnchorRequest {
  string conversation_id = 1;
  string anchor_message_id = 2;
  int32 before = 3;
  int32 after = 4;
  optional bool include_anchor = 5;
}

// GetMessagesAroundAnchorResponse 获取锚点前后消息窗口响应
message GetMessagesAroundAnchorResponse {
  Message anchor_message = 1;
  repeated Message before_messages = 2;
  repeated Message after_messages = 3;
  bool has_more_before = 4;
  bool has_more_after = 5;
}

// GetFirstUnreadAnchorRequest 获取第一条未读消息锚点请求
message GetFirstUnreadAnchorRequest {
  string conversation_id = 1;
  optional bool with_context = 2;
  optional int32 before = 3;
  optional int32 after = 4;
}

// GetFirstUnreadAnchorResponse 获取第一条未读消息锚点响应
message GetFirstUnreadAnchorResponse {
  bool found = 1;
  Message anchor_message = 2;
  repeated Message before_messages = 3;
  repeated Message after_messages = 4;
  bool has_more_before = 5;
  bool has_more_after = 6;
}

// GetMessageByIdRequest 根据ID获取消息请求
message GetMessageByIdRequest {
  string message_id = 1;
}

// RecallMessageRequest 撤回消息请求
message RecallMessageRequest {
  string message_id = 1;  // 操作用户由调用链路透传的x-user-id元数据提供
}

// DeleteMessageRequest 删除消息请求
message DeleteMessageRequest {
  string message_id = 1;  // 删除者由调用链路透传的x-user-id元数据提供
}

// MarkAsReadRequest 标记已读请求
message MarkAsReadRequest {
  string conversation_id = 1;  // 操作用户由调用链路透传的x-user-id元数据提供
  int64 last_read_seq = 2;
  optional string last_read_message_id = 3;
}

// MarkMessagesReadRequest 按消息ID批量标记已读请求
message MarkMessagesReadRequest {
  string conversation_id = 1;  // 操作用户由调用链路透传的x-user-id元数据提供
  repeated string message_ids = 2;
  optional int64 client_read_at = 3;
  optional string idempotency_key = 4;
}

// MarkMessagesReadResponse 按消息ID批量标记已读响应
message MarkMessagesReadResponse {
  repeated string accepted_ids = 1;
  repeated string ignored_ids = 2;
  int64 advanced_last_read_seq = 3;
}

// ReadTriggerEvent 阅后即焚阅读触发事件
message ReadTriggerEvent {
  string message_id = 1;
  optional int64 client_at = 2;
  optional string idempotency_key = 3;
}

// AckReadTriggersRequest 批量上报阅读触发
message AckReadTriggersRequest {
  repeated ReadTriggerEvent events = 1;  // 操作用户由调用链路透传的x-user-id元数据提供
}

// AckReadTriggersResponse 批量上报结果
message AckReadTriggersResponse {
  repeated string success_ids = 1;
  repeated string ignored_ids = 2;
}

// GetUnreadCountRequest 获取未读数请求
message GetUnreadCountRequest {
  string conversation_id = 1;  // 操作用户由调用链路透传的x-user-id元数据提供
  optional int64 last_read_seq = 2;
}

// GetUnreadCountResponse 获取未读数响应
message GetUnreadCountResponse {
  int64 unread_count = 1;
  int64 last_message_seq = 2;
  optional Message last_message = 3;
}

// GetReadReceiptsRequest 获取已读回执请求
message GetReadReceiptsRequest {
  string conversation_id = 1;  // 操作用户由调用链路透传的x-user-id元数据提供
}

// ReadReceipt 已读回执
message ReadReceipt {
  string user_id = 1;
  int64 last_read_seq = 2;
  optional string last_read_message_id = 3;
  google.protobuf.Timestamp read_at = 4;
  optional common.UserInfo user_info = 5;
}

// GetReadReceiptsResponse 获取已读回执响应
message GetReadReceiptsResponse {
  repeated ReadReceipt receipts = 1;
}

// GetConversationSequenceRequest 获取会话序列号请求
message GetConversationSequenceRequest {
  string conversation_id = 1;
}

// GetConversationSequenceResponse 获取会话序列号响应
message GetConversationSequenceResponse {
  int64 current_seq = 1;
}

// SearchMessagesRequest 搜索消息请求
message SearchMessagesRequest {
  string keyword = 1;  // 操作用户由调用链路透传的x-user-id元数据提供
  optional string conversation_id = 2;
  optional string content_type = 3;
  int32 limit = 4;
  int32 offset = 5;
}

// SearchMessagesResponse 搜索消息响应
message SearchMessagesResponse {
  repeated Message messages = 1;
  int64 total = 2;
}

// SendTypingRequest 发送输入状态请求
message SendTypingRequest {
  string conversation_id = 1;
  string from_user_id = 2;
  bool typing = 3;
  optional int32 ttl_seconds = 4;
  optional string device_id = 5;
}
