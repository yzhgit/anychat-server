syntax = "proto3";

package anychat.message;

import "google/protobuf/timestamp.proto";
import "common/common.proto";

option go_package = "github.com/anychat/server/api/proto/message;messagepb";

// MessageService message service
service MessageService {
  // SendMessage send message (single/group chat)
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);

  // GetMessages get message list (history messages)
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);

  // GetMessagesBefore get history messages before anchor message
  rpc GetMessagesBefore(GetMessagesBeforeRequest) returns (GetMessagesBeforeResponse);

  // GetMessagesAfter get messages after anchor message
  rpc GetMessagesAfter(GetMessagesAfterRequest) returns (GetMessagesAfterResponse);

  // GetMessagesAroundAnchor get window around anchor message
  rpc GetMessagesAroundAnchor(GetMessagesAroundAnchorRequest) returns (GetMessagesAroundAnchorResponse);

  // GetFirstUnreadAnchor get first unread message anchor
  rpc GetFirstUnreadAnchor(GetFirstUnreadAnchorRequest) returns (GetFirstUnreadAnchorResponse);

  // GetMessageById get message by ID
  rpc GetMessageById(GetMessageByIdRequest) returns (Message);

  // RecallMessage recall message
  rpc RecallMessage(RecallMessageRequest) returns (common.Empty);

  // DeleteMessage delete message
  rpc DeleteMessage(DeleteMessageRequest) returns (common.Empty);

  // MarkAsRead mark message as read
  rpc MarkAsRead(MarkAsReadRequest) returns (common.Empty);

  // MarkMessagesRead batch mark as read by message IDs
  rpc MarkMessagesRead(MarkMessagesReadRequest) returns (MarkMessagesReadResponse);

  // AckReadTriggers burn-after-reading trigger acknowledgment
  rpc AckReadTriggers(AckReadTriggersRequest) returns (AckReadTriggersResponse);

  // GetUnreadCount get unread message count
  rpc GetUnreadCount(GetUnreadCountRequest) returns (GetUnreadCountResponse);

  // GetReadReceipts get read receipt info
  rpc GetReadReceipts(GetReadReceiptsRequest) returns (GetReadReceiptsResponse);

  // GetConversationSequence get current conversation sequence
  rpc GetConversationSequence(GetConversationSequenceRequest) returns (GetConversationSequenceResponse);

  // SearchMessages search messages
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);

  // SendTyping send typing status (single chat)
  rpc SendTyping(SendTypingRequest) returns (common.Empty);
}

enum ConversationType {
  CONVERSATION_TYPE_UNSPECIFIED = 0;
  CONVERSATION_TYPE_SINGLE = 1;
  CONVERSATION_TYPE_GROUP = 2;
}

enum ContentType {
  CONTENT_TYPE_UNSPECIFIED = 0;
  CONTENT_TYPE_TEXT = 1;
  CONTENT_TYPE_IMAGE = 2;
  CONTENT_TYPE_VIDEO = 3;
  CONTENT_TYPE_AUDIO = 4;
  CONTENT_TYPE_FILE = 5;
  CONTENT_TYPE_LOCATION = 6;
  CONTENT_TYPE_CARD = 7;
}

// Message message
message Message {
  string message_id = 1;
  string conversation_id = 2;
  ConversationType conversation_type = 3;  // 1-single/2-group
  string sender_id = 4;
  ContentType content_type = 5;  // 1-text/2-image/3-video/4-audio/5-file/6-location/7-card
  string content = 6;  // JSON string
  int64 sequence = 7;
  optional string reply_to = 8;
  repeated string at_users = 9;
  int32 status = 10;  // 0-normal 1-recalled 2-deleted
  google.protobuf.Timestamp expire_time = 13;  // message expiration time; empty means never expires
  optional string target_id = 14;  // for single chat: peer user ID; for group chat: group ID
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;

  // extended fields (for client display)
  optional common.UserInfo sender_info = 20;
  optional Message reply_to_message = 21;
}

// SendMessageRequest send message request
message SendMessageRequest {
  string sender_id = 1;
  string conversation_id = 2;
  ContentType content_type = 3;
  string content = 4;  // JSON string
  optional string reply_to = 5;
  repeated string at_users = 6;
  string local_id = 7;  // client local ID (for send idempotency)
}

// SendMessageResponse send message response
message SendMessageResponse {
  string message_id = 1;
  int64 sequence = 2;
  google.protobuf.Timestamp timestamp = 3;
}

// GetMessagesRequest get message list request
message GetMessagesRequest {
  string conversation_id = 1;
  optional int64 start_seq = 2;  // start sequence number
  optional int64 end_seq = 3;  // end sequence number
  int32 limit = 4;  // count limit
  bool reverse = 5;  // reverse order (new to old)
}

// GetMessagesResponse get message list response
message GetMessagesResponse {
  repeated Message messages = 1;
  int64 total = 2;
  bool has_more = 3;
}

// GetMessagesBeforeRequest get messages before anchor request
message GetMessagesBeforeRequest {
  string conversation_id = 1;
  string anchor_message_id = 2;
  int32 limit = 3;
}

// GetMessagesBeforeResponse get messages before anchor response
message GetMessagesBeforeResponse {
  Message anchor_message = 1;
  repeated Message messages = 2;
  bool has_more = 3;
}

// GetMessagesAfterRequest get messages after anchor request
message GetMessagesAfterRequest {
  string conversation_id = 1;
  string anchor_message_id = 2;
  int32 limit = 3;
}

// GetMessagesAfterResponse get messages after anchor response
message GetMessagesAfterResponse {
  Message anchor_message = 1;
  repeated Message messages = 2;
  bool has_more = 3;
}

// GetMessagesAroundAnchorRequest get window around anchor request
message GetMessagesAroundAnchorRequest {
  string conversation_id = 1;
  string anchor_message_id = 2;
  int32 before = 3;
  int32 after = 4;
  optional bool include_anchor = 5;
}

// GetMessagesAroundAnchorResponse get window around anchor response
message GetMessagesAroundAnchorResponse {
  Message anchor_message = 1;
  repeated Message before_messages = 2;
  repeated Message after_messages = 3;
  bool has_more_before = 4;
  bool has_more_after = 5;
}

// GetFirstUnreadAnchorRequest get first unread anchor request
message GetFirstUnreadAnchorRequest {
  string conversation_id = 1;
  optional bool with_context = 2;
  optional int32 before = 3;
  optional int32 after = 4;
}

// GetFirstUnreadAnchorResponse get first unread anchor response
message GetFirstUnreadAnchorResponse {
  bool found = 1;
  Message anchor_message = 2;
  repeated Message before_messages = 3;
  repeated Message after_messages = 4;
  bool has_more_before = 5;
  bool has_more_after = 6;
}

// GetMessageByIdRequest get message by ID request
message GetMessageByIdRequest {
  string message_id = 1;
}

// RecallMessageRequest recall message request
message RecallMessageRequest {
  string message_id = 1;  // operator user is provided via x-user-id metadata in the call chain
}

// DeleteMessageRequest delete message request
message DeleteMessageRequest {
  string message_id = 1;  // deleter user is provided via x-user-id metadata in the call chain
}

// MarkAsReadRequest mark as read request
message MarkAsReadRequest {
  string conversation_id = 1;  // operator user is provided via x-user-id metadata in the call chain
  int64 last_read_seq = 2;
  optional string last_read_message_id = 3;
}

// MarkMessagesReadRequest batch mark as read by message IDs request
message MarkMessagesReadRequest {
  string conversation_id = 1;  // operator user is provided via x-user-id metadata in the call chain
  repeated string message_ids = 2;
  optional int64 client_read_at = 3;
  optional string idempotency_key = 4;
}

// MarkMessagesReadResponse batch mark as read response
message MarkMessagesReadResponse {
  repeated string accepted_ids = 1;
  repeated string ignored_ids = 2;
  int64 advanced_last_read_seq = 3;
}

// ReadTriggerEvent burn-after-reading trigger event
message ReadTriggerEvent {
  string message_id = 1;
  optional int64 client_at = 2;
  optional string idempotency_key = 3;
}

// AckReadTriggersRequest batch report read triggers
message AckReadTriggersRequest {
  repeated ReadTriggerEvent events = 1;  // operator user is provided via x-user-id metadata in the call chain
}

// AckReadTriggersResponse batch report result
message AckReadTriggersResponse {
  repeated string success_ids = 1;
  repeated string ignored_ids = 2;
}

// GetUnreadCountRequest get unread count request
message GetUnreadCountRequest {
  string conversation_id = 1;  // operator user is provided via x-user-id metadata in the call chain
  optional int64 last_read_seq = 2;
}

// GetUnreadCountResponse get unread count response
message GetUnreadCountResponse {
  int64 unread_count = 1;
  int64 last_message_seq = 2;
  optional Message last_message = 3;
}

// GetReadReceiptsRequest get read receipts request
message GetReadReceiptsRequest {
  string conversation_id = 1;  // operator user is provided via x-user-id metadata in the call chain
}

// ReadReceipt read receipt
message ReadReceipt {
  string user_id = 1;
  int64 last_read_seq = 2;
  optional string last_read_message_id = 3;
  google.protobuf.Timestamp read_at = 4;
  optional common.UserInfo user_info = 5;
}

// GetReadReceiptsResponse get read receipts response
message GetReadReceiptsResponse {
  repeated ReadReceipt receipts = 1;
}

// GetConversationSequenceRequest get conversation sequence request
message GetConversationSequenceRequest {
  string conversation_id = 1;
}

// GetConversationSequenceResponse get conversation sequence response
message GetConversationSequenceResponse {
  int64 current_seq = 1;
}

// SearchMessagesRequest search messages request
message SearchMessagesRequest {
  string keyword = 1;  // operator user is provided via x-user-id metadata in the call chain
  optional string conversation_id = 2;
  optional ContentType content_type = 3;
  int32 limit = 4;
  int32 offset = 5;
}

// SearchMessagesResponse search messages response
message SearchMessagesResponse {
  repeated Message messages = 1;
  int64 total = 2;
}

// SendTypingRequest send typing status request
message SendTypingRequest {
  string conversation_id = 1;
  string from_user_id = 2;
  bool typing = 3;
  optional int32 ttl_seconds = 4;
  optional string device_id = 5;
}
