syntax = "proto3";

package file;

option go_package = "github.com/anychat/server/api/proto/file;file";

// FileType file type
enum FileType {
  FILE_TYPE_UNSPECIFIED = 0;
  FILE_TYPE_IMAGE = 1;
  FILE_TYPE_VIDEO = 2;
  FILE_TYPE_AUDIO = 3;
  FILE_TYPE_FILE = 4;
  FILE_TYPE_LOG = 5;
}

// FileStatus file status
enum FileStatus {
  FILE_STATUS_DELETED = 0;
  FILE_STATUS_ACTIVE = 1;
  FILE_STATUS_PROCESSING = 2;
}

// UploadStatus multipart upload status
enum UploadStatus {
  UPLOAD_STATUS_UNSPECIFIED = 0;
  UPLOAD_STATUS_PENDING = 1;
  UPLOAD_STATUS_UPLOADING = 2;
  UPLOAD_STATUS_COMPLETED = 3;
  UPLOAD_STATUS_FAILED = 4;
}

// FileService file service
service FileService {
  // GenerateUploadToken generate upload token
  rpc GenerateUploadToken(GenerateUploadTokenRequest) returns (GenerateUploadTokenResponse);

  // CompleteUpload complete upload
  rpc CompleteUpload(CompleteUploadRequest) returns (FileInfo);

  // GenerateDownloadURL generate download URL
  rpc GenerateDownloadURL(GenerateDownloadURLRequest) returns (GenerateDownloadURLResponse);

  // GetFileInfo get file info
  rpc GetFileInfo(GetFileInfoRequest) returns (FileInfo);

  // DeleteFile delete file
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);

  // ListUserFiles list user files
  rpc ListUserFiles(ListUserFilesRequest) returns (ListUserFilesResponse);

  // BatchGetFileInfo batch get file info
  rpc BatchGetFileInfo(BatchGetFileInfoRequest) returns (BatchGetFileInfoResponse);
}

// FileInfo file info
message FileInfo {
  string file_id = 1;
  string user_id = 2;
  string file_name = 3;
  FileType file_type = 4;
  int64 file_size = 5;
  string mime_type = 6;
  string storage_path = 7;
  string thumbnail_path = 8;
  string bucket_name = 9;
  FileStatus status = 10;
  int64 created_at = 11;
  optional int64 expires_at = 12;
  optional string metadata = 13;  // JSON string
  optional string download_url = 14;
  optional string thumbnail_url = 15;
}

// GenerateUploadTokenRequest generate upload token request
message GenerateUploadTokenRequest {
  string user_id = 1;
  string file_name = 2;
  int64 file_size = 3;
  string mime_type = 4;
  FileType file_type = 5;
  optional int32 expires_hours = 6;  // file expiration time (hours), 0 means never expires
}

// GenerateUploadTokenResponse generate upload token response
message GenerateUploadTokenResponse {
  string file_id = 1;
  string upload_url = 2;
  int64 expires_in = 3;  // URL validity (seconds)
}

// CompleteUploadRequest complete upload request
message CompleteUploadRequest {
  string file_id = 1;
  string user_id = 2;
}

// GenerateDownloadURLRequest generate download URL request
message GenerateDownloadURLRequest {
  string file_id = 1;
  string user_id = 2;
  optional int32 expires_minutes = 3;  // URL validity (minutes), default 60
}

// GenerateDownloadURLResponse generate download URL response
message GenerateDownloadURLResponse {
  string download_url = 1;
  int64 expires_in = 2;  // URL validity (seconds)
  optional string thumbnail_url = 3;
}

// GetFileInfoRequest get file info request
message GetFileInfoRequest {
  string file_id = 1;
  string user_id = 2;
}

// DeleteFileRequest delete file request
message DeleteFileRequest {
  string file_id = 1;
  string user_id = 2;
}

// DeleteFileResponse delete file response
message DeleteFileResponse {
  bool success = 1;
}

// ListUserFilesRequest list user files request
message ListUserFilesRequest {
  string user_id = 1;
  optional FileType file_type = 2;  // optional: filter by file type
  int32 page = 3;
  int32 page_size = 4;
}

// ListUserFilesResponse list user files response
message ListUserFilesResponse {
  repeated FileInfo files = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// BatchGetFileInfoRequest batch get file info request
message BatchGetFileInfoRequest {
  repeated string file_ids = 1;
  string user_id = 2;
}

// BatchGetFileInfoResponse batch get file info response
message BatchGetFileInfoResponse {
  repeated FileInfo files = 1;
}
