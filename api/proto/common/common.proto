syntax = "proto3";

package anychat.common;

option go_package = "github.com/anychat/server/api/proto/common;commonpb";

// Empty empty message
message Empty {}

// PaginationRequest pagination request
message PaginationRequest {
  int32 page = 1;       // page number, starting from 1
  int32 page_size = 2;  // page size
}

// PaginationResponse pagination response
message PaginationResponse {
  int64 total = 1;      // total record count
  int32 page = 2;       // current page number
  int32 page_size = 3;  // page size
}

// UserInfo basic user info (shared across services)
message UserInfo {
  string user_id = 1;
  string nickname = 2;
  string avatar = 3;
  optional string phone = 4;
  optional string email = 5;
}

// TokenInfo token info (shared across services)
message TokenInfo {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;  // expiration time (seconds)
}
