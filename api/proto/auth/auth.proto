syntax = "proto3";

package anychat.auth;

import "common/common.proto";

option go_package = "github.com/anychat/server/api/proto/auth;authpb";

enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_IOS = 1;
  DEVICE_TYPE_ANDROID = 2;
  DEVICE_TYPE_WEB = 3;
  DEVICE_TYPE_PC = 4;
  DEVICE_TYPE_H5 = 5;
}

enum VerificationTargetType {
  VERIFICATION_TARGET_TYPE_UNSPECIFIED = 0;
  VERIFICATION_TARGET_TYPE_SMS = 1;
  VERIFICATION_TARGET_TYPE_EMAIL = 2;
}

enum VerificationPurpose {
  VERIFICATION_PURPOSE_UNSPECIFIED = 0;
  VERIFICATION_PURPOSE_REGISTER = 1;
  VERIFICATION_PURPOSE_LOGIN = 2;
  VERIFICATION_PURPOSE_RESET_PASSWORD = 3;
  VERIFICATION_PURPOSE_BIND_PHONE = 4;
  VERIFICATION_PURPOSE_CHANGE_PHONE = 5;
  VERIFICATION_PURPOSE_BIND_EMAIL = 6;
  VERIFICATION_PURPOSE_CHANGE_EMAIL = 7;
}

// AuthService authentication service
service AuthService {
  // SendVerificationCode send verification code
  rpc SendVerificationCode(SendVerificationCodeRequest) returns (SendVerificationCodeResponse);

  // Register user registration
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Login user login
  rpc Login(LoginRequest) returns (LoginResponse);

  // Logout user logout
  rpc Logout(LogoutRequest) returns (common.Empty);

  // RefreshToken refresh access token
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // ChangePassword change password
  rpc ChangePassword(ChangePasswordRequest) returns (common.Empty);

  // ResetPassword reset password (forgot password)
  rpc ResetPassword(ResetPasswordRequest) returns (common.Empty);

  // ValidateToken validate token (called by gateway)
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

// SendVerificationCodeRequest send verification code request
message SendVerificationCodeRequest {
  string target = 1;                        // phone number or email
  VerificationTargetType target_type = 2;  // 1-sms 2-email
  VerificationPurpose purpose = 3;         // 1-register 2-login 3-reset_password 4-bind_phone 5-change_phone 6-bind_email 7-change_email
  string device_id = 4;
  string ip_address = 5;
}

// SendVerificationCodeResponse send verification code response
message SendVerificationCodeResponse {
  string code_id = 1;
  int64 expires_in = 2;
}

// RegisterRequest registration request
message RegisterRequest {
  optional string phone_number = 1;
  optional string email = 2;
  string password = 3;
  string verify_code = 4;
  optional string nickname = 5;
  DeviceType device_type = 6;  // 1-ios 2-android 3-web 4-pc 5-h5
  string device_id = 7;
  string client_version = 8;  // client version, used for upgrade checks
}

// RegisterResponse registration response
message RegisterResponse {
  string user_id = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_in = 4;
}

// LoginRequest login request
message LoginRequest {
  string account = 1;      // phone number or email
  string password = 2;
  DeviceType device_type = 3;  // 1-ios 2-android 3-web 4-pc 5-h5
  string device_id = 4;
  string client_version = 5;  // client version, used for upgrade checks
  string ip_address = 6;     // client IP address
}

// LoginResponse login response
message LoginResponse {
  string user_id = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_in = 4;
  common.UserInfo user = 5;
}

// LogoutRequest logout request
message LogoutRequest {
  string user_id = 1;      // extracted from JWT by gateway
  string device_id = 2;
}

// RefreshTokenRequest refresh token request
message RefreshTokenRequest {
  string refresh_token = 1;
}

// RefreshTokenResponse refresh token response
message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
}

// ChangePasswordRequest change password request
message ChangePasswordRequest {
  string user_id = 1;       // extracted from JWT by gateway
  string device_id = 2;     // current device ID, used to exclude forced logout
  string old_password = 3;
  string new_password = 4;
}

// ResetPasswordRequest reset password request
message ResetPasswordRequest {
  string account = 1;       // phone number or email
  string verify_code = 2;   // verification code
  string new_password = 3; // new password
}

// ValidateTokenRequest validate token request
message ValidateTokenRequest {
  string access_token = 1;
}

// ValidateTokenResponse validate token response
message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string device_id = 3;
  DeviceType device_type = 4;
}
