syntax = "proto3";

package anychat.friend;

import "google/protobuf/timestamp.proto";
import "common/common.proto";

option go_package = "github.com/anychat/server/api/proto/friend;friendpb";

enum FriendRequestSource {
  FRIEND_REQUEST_SOURCE_UNSPECIFIED = 0;
  FRIEND_REQUEST_SOURCE_SEARCH = 1;
  FRIEND_REQUEST_SOURCE_QRCODE = 2;
  FRIEND_REQUEST_SOURCE_GROUP = 3;
  FRIEND_REQUEST_SOURCE_CONTACTS = 4;
}

enum FriendRequestStatus {
  FRIEND_REQUEST_STATUS_UNSPECIFIED = 0;
  FRIEND_REQUEST_STATUS_PENDING = 1;
  FRIEND_REQUEST_STATUS_ACCEPTED = 2;
  FRIEND_REQUEST_STATUS_REJECTED = 3;
  FRIEND_REQUEST_STATUS_EXPIRED = 4;
}

enum FriendRequestAction {
  FRIEND_REQUEST_ACTION_UNSPECIFIED = 0;
  FRIEND_REQUEST_ACTION_ACCEPT = 1;
  FRIEND_REQUEST_ACTION_REJECT = 2;
}

enum FriendRequestQueryType {
  FRIEND_REQUEST_QUERY_TYPE_UNSPECIFIED = 0;
  FRIEND_REQUEST_QUERY_TYPE_RECEIVED = 1;
  FRIEND_REQUEST_QUERY_TYPE_SENT = 2;
}

// FriendService friend service
service FriendService {
  // GetFriendList get friend list
  rpc GetFriendList(GetFriendListRequest) returns (GetFriendListResponse);

  // SendFriendRequest send friend request
  rpc SendFriendRequest(SendFriendRequestRequest) returns (SendFriendRequestResponse);

  // HandleFriendRequest handle friend request (accept/reject)
  rpc HandleFriendRequest(HandleFriendRequestRequest) returns (common.Empty);

  // GetFriendRequests get friend request list
  rpc GetFriendRequests(GetFriendRequestsRequest) returns (GetFriendRequestsResponse);

  // DeleteFriend delete friend
  rpc DeleteFriend(DeleteFriendRequest) returns (common.Empty);

  // UpdateRemark update friend remark
  rpc UpdateRemark(UpdateRemarkRequest) returns (common.Empty);

  // AddToBlacklist add to blacklist
  rpc AddToBlacklist(AddToBlacklistRequest) returns (common.Empty);

  // RemoveFromBlacklist remove from blacklist
  rpc RemoveFromBlacklist(RemoveFromBlacklistRequest) returns (common.Empty);

  // GetBlacklist get blacklist
  rpc GetBlacklist(GetBlacklistRequest) returns (GetBlacklistResponse);

  // IsFriend check whether users are friends (for other services)
  rpc IsFriend(IsFriendRequest) returns (IsFriendResponse);

  // IsBlocked check whether blocked (for other services)
  rpc IsBlocked(IsBlockedRequest) returns (IsBlockedResponse);

  // BatchCheckFriend batch check friend relationships
  rpc BatchCheckFriend(BatchCheckFriendRequest) returns (BatchCheckFriendResponse);
}

// Friend friend info
message Friend {
  string user_id = 1;
  string remark = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  common.UserInfo user_info = 5;  // basic user info (from user-service)
}

// FriendRequest friend request
message FriendRequest {
  int64 id = 1;
  string from_user_id = 2;
  string to_user_id = 3;
  string message = 4;
  FriendRequestSource source = 5;
  FriendRequestStatus status = 6;
  google.protobuf.Timestamp created_at = 7;
  common.UserInfo from_user_info = 8;  // requester info
}

// BlacklistItem blacklist item
message BlacklistItem {
  int64 id = 1;
  string user_id = 2;
  string blocked_user_id = 3;
  google.protobuf.Timestamp created_at = 4;
  common.UserInfo blocked_user_info = 5;  // blocked user info
}

// GetFriendListRequest get friend list request
message GetFriendListRequest {
  string user_id = 1;
  optional int64 last_update_time = 2;  // incremental sync
}

// GetFriendListResponse get friend list response
message GetFriendListResponse {
  repeated Friend friends = 1;
  int64 total = 2;
}

// SendFriendRequestRequest send friend request request
message SendFriendRequestRequest {
  string from_user_id = 1;
  string to_user_id = 2;
  string message = 3;
  FriendRequestSource source = 4;
}

// SendFriendRequestResponse send friend request response
message SendFriendRequestResponse {
  int64 request_id = 1;
  bool auto_accepted = 2;  // whether auto-accepted
}

// HandleFriendRequestRequest handle friend request request
message HandleFriendRequestRequest {
  string user_id = 1;  // current user ID (request recipient)
  int64 request_id = 2;
  FriendRequestAction action = 3;
}

// GetFriendRequestsRequest get friend request list request
message GetFriendRequestsRequest {
  string user_id = 1;
  FriendRequestQueryType request_type = 2;
}

// GetFriendRequestsResponse get friend request list response
message GetFriendRequestsResponse {
  repeated FriendRequest requests = 1;
  int64 total = 2;
}

// DeleteFriendRequest delete friend request
message DeleteFriendRequest {
  string user_id = 1;
  string friend_id = 2;
}

// UpdateRemarkRequest update remark request
message UpdateRemarkRequest {
  string user_id = 1;
  string friend_id = 2;
  string remark = 3;
}

// AddToBlacklistRequest add to blacklist request
message AddToBlacklistRequest {
  string user_id = 1;
  string blocked_user_id = 2;
}

// RemoveFromBlacklistRequest remove from blacklist request
message RemoveFromBlacklistRequest {
  string user_id = 1;
  string blocked_user_id = 2;
}

// GetBlacklistRequest get blacklist request
message GetBlacklistRequest {
  string user_id = 1;
}

// GetBlacklistResponse get blacklist response
message GetBlacklistResponse {
  repeated BlacklistItem items = 1;
  int64 total = 2;
}

// IsFriendRequest check friend relationship request
message IsFriendRequest {
  string user_id = 1;
  string friend_id = 2;
}

// IsFriendResponse check friend relationship response
message IsFriendResponse {
  bool is_friend = 1;
}

// IsBlockedRequest check blacklist request
message IsBlockedRequest {
  string user_id = 1;
  string target_user_id = 2;
}

// IsBlockedResponse check blacklist response
message IsBlockedResponse {
  bool is_blocked = 1;
}

// BatchCheckFriendRequest batch check friend relationship request
message BatchCheckFriendRequest {
  string user_id = 1;
  repeated string friend_ids = 2;
}

// BatchCheckFriendResponse batch check friend relationship response
message BatchCheckFriendResponse {
  map<string, bool> results = 1;  // friend_id -> is_friend
}
