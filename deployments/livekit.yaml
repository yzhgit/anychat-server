# LiveKit Server Configuration
# Documentation: https://docs.livekit.io/oss/deployment/config/

port: 7880
bind_addresses:
  - ""

# API Keys: key -> secret
keys:
  devkey: secret

# Logging level
logging:
  level: info
  pion_level: error

# Room configuration
room:
  # Auto-close empty room timeout (seconds), 0=never close
  empty_timeout: 300
  # Max participants per room
  max_participants: 100
  # Auto-create rooms
  auto_create: true

# WebRTC configuration
rtc:
  udp_port: 7882
  tcp_port: 7881
  use_external_ip: false
  stun_servers: []