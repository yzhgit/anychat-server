# Redis Configuration - AnyChat IM System
# Documentation: https://redis.io/docs/management/config/

# ===== Network =====
bind 0.0.0.0
port 6379
tcp-backlog 511
# Idle connection timeout (seconds), 0=never timeout
timeout 300
tcp-keepalive 300

# ===== General =====
daemonize no
loglevel notice
databases 16

# ===== Persistence: RDB Snapshots =====
# Trigger snapshot when: 1 write in 3600s / 100 writes in 300s / 10000 writes in 60s
save 3600 1
save 300 100
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ===== Persistence: AOF Append Log =====
appendonly yes
appendfilename "appendonly.aof"
# everysec: fsync every second, balanced performance and safety
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# ===== Memory Management =====
# IM use case: Session/Token data is recoverable, LRU eviction preferred
maxmemory 256mb
maxmemory-policy allkeys-lru
# Lazy delete: async key expiration/deletion to avoid blocking
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ===== Slow Query Log =====
slowlog-log-slower-than 10000
slowlog-max-len 128

# ===== Performance Tuning =====
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes

# ===== Security =====
# No password in dev environment, enable in production:
# requirepass your-strong-password
# Disable dangerous commands (recommended in production):
# rename-command FLUSHALL ""
# rename-command FLUSHDB  ""
# rename-command DEBUG    ""