# NATS Server Configuration - AnyChat IM System
# Documentation: https://docs.nats.io/running-a-nats-service/configuration

# ===== Server Basic Settings =====
server_name: "anychat-nats"
host: "0.0.0.0"
port: 4222

# ===== Monitoring (HTTP) =====
http_port: 8222

# ===== Connection Limits =====
# 12 microservices × multiple instances, reserved margin
max_connections: 1024

# IM messages are small (files use MinIO), 4MB is sufficient
max_payload: 4MB

# ===== Slow Consumer Protection =====
# Per-connection send buffer limit (64MB)
# push-service uses notification.> to subscribe to all messages, needs sufficient buffer
max_pending: 67108864

# Write timeout: disconnect slow connections after this time
write_deadline: "10s"

# ===== Ping/Pong Keepalive =====
ping_interval: "60s"

# ===== JetStream (Message Persistence and Replay) =====
# Current business uses Core NATS Pub/Sub, JetStream reserved for future reliable delivery
jetstream {
  store_dir: "/data/jetstream"
  # Max disk storage (1GB)
  max_file_store: 1GB
  # Max memory storage (256MB), for low-latency scenarios
  max_memory_store: 256MB
}

# ===== Logging =====
logtime: true
log_size_limit: 67108864  # Rotate after 64MB

# debug: false
# trace: false