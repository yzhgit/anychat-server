server:
  name: anychat-server
  mode: development

database:
  postgres:
    host: localhost
    port: 5432
    user: anychat
    password: anychat123
    database: anychat
    max_open_conns: 100
    max_idle_conns: 10
    conn_max_lifetime: 3600

  redis:
    host: localhost
    port: 6379
    password: ""
    db: 0
    pool_size: 10

nats:
  url: nats://localhost:4222

minio:
  endpoint: localhost:9000
  access_key: minioadmin
  secret_key: minioadmin
  use_ssl: false
  buckets:
    - avatar
    - group-avatar
    - chat-file

zitadel:
  url: http://localhost:8090
  project_id: ""
  client_id: ""
  client_secret: ""

livekit:
  url: ws://localhost:7880
  api_key: devkey
  api_secret: secret

# JPush configuration
jpush:
  app_key: ${JPUSH_APP_KEY:}
  master_secret: ${JPUSH_MASTER_SECRET:}
  apns_production: false  # true=production APNs, false=sandbox

jwt:
  secret: your-secret-key-change-in-production
  access_token_expire: 7200
  refresh_token_expire: 604800

log:
  level: debug
  output: stdout
  file_path: ./logs/app.log

monitoring:
  prometheus:
    enabled: true
    port: 2112
  jaeger:
    enabled: true
    endpoint: http://localhost:14268/api/traces

# Microservice gRPC address configuration
services:
  auth:
    grpc_addr: ${AUTH_GRPC_ADDR:localhost:9001}
  user:
    grpc_addr: ${USER_GRPC_ADDR:localhost:9002}
  friend:
    grpc_addr: ${FRIEND_GRPC_ADDR:localhost:9003}
  group:
    grpc_addr: ${GROUP_GRPC_ADDR:localhost:9004}
  message:
    grpc_addr: ${MESSAGE_GRPC_ADDR:localhost:9005}
  conversation:
    grpc_addr: ${CONVERSATION_GRPC_ADDR:localhost:9006}
  file:
    grpc_addr: ${FILE_GRPC_ADDR:localhost:9007}
  push:
    grpc_addr: ${PUSH_GRPC_ADDR:localhost:9008}
  calling:
    grpc_addr: ${CALLING_GRPC_ADDR:localhost:9009}
  sync:
    grpc_addr: ${SYNC_GRPC_ADDR:localhost:9010}
  admin:
    grpc_addr: ${ADMIN_GRPC_ADDR:localhost:9011}

verify:
  code:
    length: 6
    expire_seconds: 300
    max_attempts: 5
    hash_secret: ${VERIFY_CODE_HASH_SECRET:change-me-for-production}
    debug_fixed_code: ${VERIFY_DEBUG_FIXED_CODE:123456}
    allow_dev_bypass: ${VERIFY_ALLOW_DEV_BYPASS:true}
  rate_limit:
    target_per_minute: 1
    target_per_day: 10
    ip_per_hour: 200
    device_per_day: 100
  sms:
    provider: aliyun
    aliyun:
      access_key: ${SMS_ACCESS_KEY:}
      access_secret: ${SMS_ACCESS_SECRET:}
      sign_name: ${SMS_SIGN_NAME:AnyChat}
      template_code: ${SMS_TEMPLATE_CODE:}
    tencent:
      secret_id: ${TENCENT_SECRET_ID:}
      secret_key: ${TENCENT_SECRET_KEY:}
      app_id: ${TENCENT_APP_ID:}
      sign_name: ${SMS_SIGN_NAME:AnyChat}
      template_id: ${SMS_TEMPLATE_ID:}
  email:
    host: ${EMAIL_HOST:smtp.example.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    from_name: ${EMAIL_FROM_NAME:AnyChat}
    from_address: ${EMAIL_FROM_ADDRESS:noreply@anychat.com}

# Admin Service configuration
admin:
  jwt:
    secret: ${ADMIN_JWT_SECRET:admin-secret-change-in-production}
    access_token_expire: 28800  # 8 hours

# Gateway service configuration
gateway:
  http_port: 8080
